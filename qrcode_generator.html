<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周鲁烈士故居 - 二维码生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #C62828;
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #C62828;
        }
        button {
            background: #C62828;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin: 10px 5px;
        }
        button:hover {
            background: #B71C1C;
        }
        button.secondary {
            background: #666;
        }
        button.secondary:hover {
            background: #555;
        }
        #qrcode-container {
            margin: 30px 0;
            display: none;
        }
        #qrcode-container canvas {
            border: 10px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .url-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            word-break: break-all;
            font-size: 14px;
            color: #333;
        }
        .tip {
            margin-top: 20px;
            padding: 15px;
            background: #FFF3E0;
            border-radius: 10px;
            font-size: 14px;
            color: #E65100;
        }
        .steps {
            text-align: left;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        .steps h3 {
            color: #C62828;
            margin-bottom: 15px;
        }
        .steps ol {
            padding-left: 20px;
        }
        .steps li {
            margin: 10px 0;
            color: #555;
        }
        .steps code {
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        .download-btn {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ 周鲁烈士故居</h1>
        <p class="subtitle">数字化全景展示 - 二维码生成器</p>
        
        <div class="steps">
            <h3>快速部署到 Vercel：</h3>
            <ol>
                <li>打开终端，进入项目目录</li>
                <li>运行 <code>npm install -g vercel</code></li>
                <li>运行 <code>vercel login</code> 登录</li>
                <li>运行 <code>vercel --prod</code> 部署</li>
                <li>复制生成的 URL 粘贴到下方</li>
            </ol>
        </div>

        <div class="input-group">
            <input type="text" id="url-input" placeholder="输入部署后的 URL，例如：https://vr-web.vercel.app">
        </div>
        
        <button onclick="generateQR()">生成二维码</button>
        <button onclick="useLocalhost()" class="secondary">使用本地地址</button>
        
        <div id="qrcode-container">
            <canvas id="qrcode"></canvas>
            <div class="url-display" id="url-display"></div>
            <button onclick="downloadQR()" class="download-btn" id="download-btn">📥 下载二维码</button>
        </div>

        <div class="tip">
            💡 提示：Vercel 部署后会自动分配一个域名，格式通常为：<br>
            <strong>https://项目名-xxx.vercel.app</strong>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('qrcode');
        const container = document.getElementById('qrcode-container');
        const urlInput = document.getElementById('url-input');
        const urlDisplay = document.getElementById('url-display');
        const downloadBtn = document.getElementById('download-btn');

        function generateQR() {
            const url = urlInput.value.trim();
            
            if (!url) {
                alert('请输入有效的 URL');
                return;
            }

            // 验证 URL 格式
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                alert('请输入完整的 URL（以 http:// 或 https:// 开头）');
                return;
            }

            // 生成二维码
            QRCode.toCanvas(canvas, url, {
                width: 300,
                margin: 2,
                color: {
                    dark: '#C62828',
                    light: '#FFFFFF'
                }
            }, function(error) {
                if (error) {
                    console.error(error);
                    alert('生成二维码失败');
                    return;
                }
                
                // 显示容器
                container.style.display = 'block';
                urlDisplay.textContent = url;
                downloadBtn.style.display = 'inline-block';
                
                // 滚动到二维码位置
                container.scrollIntoView({ behavior: 'smooth' });
            });
        }

        function useLocalhost() {
            urlInput.value = 'http://localhost:5173';
            generateQR();
        }

        function downloadQR() {
            const link = document.createElement('a');
            link.download = '周鲁烈士故居全景展示_二维码.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 回车键生成二维码
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });
    </script>
</body>
</html>
